  - id: integrations-image-8
    image: src/assets/integrations/image-8.png
    # NOTE: Prose shows the OAuth connection edit dialog (Client ID, Client
    # Secret, Auth URL, Scope) for Microsoft_Graph. That dialog lives on the
    # integration detail page, not the integrations list — the row Edit
    # button on /integrations opens CreateIntegrationDialog, which has no
    # OAuth fields. So this entry navigates to the detail page and opens
    # "Edit Configuration" from the OAuth card's overflow menu.
    route: /integrations/aaaa1111-1111-1111-1111-111111111111
    capture:
      mocks:
        - url: '**/api/integrations'
          fixture: fixtures/integrations-list-with-graph.json
        - url: '**/api/integrations?**'
          fixture: fixtures/integrations-list-with-graph.json
        - url: '**/api/integrations/aaaa1111-1111-1111-1111-111111111111'
          fixture: fixtures/integration-detail-graph.json
        - url: '**/api/oauth/connections/aaaa1111-1111-1111-1111-111111111111'
          fixture: fixtures/oauth-connection-graph.json
        - url: '**/api/organizations'
          body: []
      actions:
        - wait_for: 'div:has(> div > div:has-text("Connection status and authentication")) button[aria-haspopup="menu"]'
        - click: 'div:has(> div > div:has-text("Connection status and authentication")) button[aria-haspopup="menu"]'
        - wait_for: '[role="menuitem"]:has-text("Edit Configuration")'
        - click: '[role="menuitem"]:has-text("Edit Configuration")'
        - wait_for: '[role="dialog"]:has-text("Edit OAuth Connection")'
        - wait_ms: 300
    diataxis:
      page: src/content/docs/getting-started/integrations.mdx
      type: tutorial
      heading: Create Integration in Bifrost
    captured_at:
      bifrost_sha: 0cfa0ba2b3d546253d572cf9222b6dd42367c311
      timestamp: '2026-04-26T03:33:49.536Z'
