version: 1
defaults:
  auth_as: platform_admin
  viewport:
    width: 1440
    height: 900
  pad: 16
  settle_ms: 800
  # Default content-area crop. Strips the 256px-wide sidebar and 64px-tall
  # top header from every screenshot so docs images don't waste space on
  # chrome. Per-entry `capture.crop` overrides this.
  crop:
    x: 256
    y: 64
    width: 1184
    height: 836
  mocks:
    - url: '**/api/forms'
      fixture: fixtures/forms-list.json
    - url: '**/api/workflows'
      fixture: fixtures/workflows-list.json
    - url: '**/api/workflows?**'
      fixture: fixtures/workflows-list.json
    - url: '**/api/integrations'
      fixture: fixtures/integrations-list.json
    - url: '**/api/integrations?**'
      fixture: fixtures/integrations-list.json
    - url: '**/api/applications'
      fixture: fixtures/applications-list.json
    - url: '**/api/applications?**'
      fixture: fixtures/applications-list.json
    - url: '**/api/agents'
      body: []
    - url: '**/api/metrics'
      fixture: fixtures/dashboard-metrics.json
