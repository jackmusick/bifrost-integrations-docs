      # "Create Integration in Bifrost" — opens the edit dialog on the
      # Microsoft_Graph row to show its OAuth/config fields. Reached by
      # clicking the pencil icon on the row; that flow is driven by
      # per-entry actions below.
      mocks:
        - url: '**/api/integrations'
          fixture: fixtures/integrations-list-with-graph.json
        - url: '**/api/integrations?**'
          fixture: fixtures/integrations-list-with-graph.json
      actions:
        # Click the pencil (Edit) button on the Microsoft_Graph row.
        - click: 'tr:has-text("Microsoft_Graph") button[title="Edit"]'
        # Wait for the edit dialog to render before screenshotting.
        - wait_for: '[role="dialog"]'
        - wait_ms: 300
    diataxis:
